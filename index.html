<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Survey Form</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1 id="title">Tech Insights Survey</h1>
        <p id="description">Help us improve the ecosystem by sharing your experince.</p>
    </header>

    <form id="survey-form">
        <div class="form-group">
            <label id="name-label" for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label id="email-label" for="email">Email</label>
            <input type="email" id="email" placeholder="Enter you email" required>

        </div>
    </form>

    
    
</body>
</html>
