<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Survey Form</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1 id="title">Tech Insights Survey</h1>
        <p id="description">Help us improve the ecosystem by sharing your experince.</p>
    </header>

    <form id="survey-form">
        <div class="form-group">
            <label id="name-label" for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label id="email-label" for="email">Email</label>
            <input type="email" id="email" placeholder="Enter you email" required>

        </div>

        <div class="form-group">
            <label id="number-label" for="number">Age (optional)</label>
            <input type="number" id="number" min="10" max="99" placeholder="Age">

        </div>

        <div class="form-group">

            <p>Which option best describes your current role?</p>
            <select id="dropdown" name="role" required>
                <option disabled selected value>Select current role</option>
                <option value="student">Student</option>
                <option value="job">Full Time Job</option>
                <option value="learner">Full Time Learner</option>
                <option value="preferNo">Prefer not to say</option>
                <option value="other">Other</option>
            </select>
        </div>

        
    </form>

    
    
</body>
</html>
